services:
  - type: web
    name: solve-innovate-backend
    env: docker
    rootDir: fastapi
    plan: free # or starter
    healthCheckPath: /docs
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: LLM
        value: openai
      - key: IMAGE_PROVIDER
        value: dall-e-3
      - key: APP_DATA_DIRECTORY
        value: /app/app_data
